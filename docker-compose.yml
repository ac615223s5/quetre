version: '3'

services:
  quetre:
    env_file: .env
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - "NODE_ENV=production"
      - "PORT=3000"
      - "CACHE_PERIOD=1h"
      - "REDIS_URL=redis:6379" # optional
      - "REDIS_TTL=3600"
      - "CYCLETLS_FORCE_HTTP3=1"
      - "CYCLETLS_QUIC_FINGERPRINT=1:65536;6:262144;7:100;51:1;GREASE|GREASE|984832|m,a,s,p"
      - "AXIOS_USER_AGENT=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/138.0.0.0 Safari/537.36"

  redis:
   image: docker.io/redis:alpine
   container_name: redis
   restart: unless-stopped
